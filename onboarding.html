<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Your Profile — TransformX AI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    .goal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    .range-input { width: 100%; accent-color: var(--primary); cursor: pointer; }
    .bmi-display { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .photo-preview { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-sm); }
    .complete-screen { text-align: center; padding: 20px 0; }
    .complete-icon { font-size: 5rem; animation: bounceIn 0.8s ease; }
    .ai-generating { display: flex; align-items: center; gap: 12px; background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.15); border-radius: var(--radius-sm); padding: 14px 16px; margin-top: 16px; }
    .ai-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); animation: pulse-dot 1s infinite; }
    .ai-dot:nth-child(2) { animation-delay: 0.2s; }
    .ai-dot:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="onboarding-header">
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="width:32px;height:32px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:1rem;">⚡</div>
    <span style="font-weight:800;font-size:1rem;">Transform<span style="color:#818cf8;">X AI</span></span>
  </div>
  <div style="text-align:center;">
    <div style="font-size:0.85rem;font-weight:600;" id="stepLabel">Step 1 of 10</div>
    <div style="font-size:0.75rem;color:var(--text-muted);" id="stepTitle">Personal Information</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span style="font-size:0.8rem;color:var(--text-muted);" id="autoSaveStatus">● Auto-saving</span>
    <button onclick="TXUtils.auth.logout()" style="background:none;color:var(--text-muted);font-size:0.82rem;">Logout</button>
  </div>
</div>

<!-- PROGRESS BAR -->
<div style="background:var(--bg-secondary);padding:16px 40px;border-bottom:1px solid var(--border);">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="font-size:0.8rem;font-weight:600;color:var(--text-secondary);" id="progressPct">0% complete</span>
    <span style="font-size:0.78rem;color:var(--text-muted);">Your data is saved automatically</span>
  </div>
  <div style="display:flex;gap:4px;" id="stepDots"></div>
</div>

<!-- ONBOARDING BODY -->
<div class="onboarding-body" id="onboardingBody">
  <div class="onboarding-card" id="stepCard"></div>
</div>

<!-- FOOTER NAV -->
<div class="onboarding-footer">
  <button class="btn btn-ghost" id="prevBtn" onclick="prevStep()">← Previous</button>
  <div style="display:flex;align-items:center;gap:16px;">
    <span style="font-size:0.8rem;color:var(--text-muted);" id="footerStepInfo"></span>
    <button class="btn btn-primary btn-lg" id="nextBtn" onclick="nextStep()">Continue →</button>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script>
// ===== ONBOARDING STATE =====
let currentStep = 0;
const TOTAL_STEPS = 10;
let profile = {};

// Redirect if not logged in
if (!TXUtils.auth.isLoggedIn()) { window.location.href = 'auth.html'; }
// If already complete, go to app
if (TXUtils.auth.onboardingComplete()) { window.location.href = 'app.html'; }

// Load saved progress
function loadProgress() {
  const saved = TXUtils.storage.get('onboarding_progress');
  if (saved) {
    profile = saved.profile || {};
    currentStep = saved.step || 0;
    if (currentStep >= TOTAL_STEPS) { currentStep = TOTAL_STEPS - 1; }
  }
  const user = TXUtils.auth.getUser();
  if (user) {
    profile.firstName = profile.firstName || user.firstName || '';
    profile.lastName = profile.lastName || user.lastName || '';
    profile.email = profile.email || user.email || '';
  }
}

function saveProgress() {
  TXUtils.storage.set('onboarding_progress', { profile, step: currentStep, updated: Date.now() });
  const status = document.getElementById('autoSaveStatus');
  if (status) {
    status.textContent = '✓ Saved';
    status.style.color = 'var(--success)';
    setTimeout(() => { status.textContent = '● Auto-saving'; status.style.color = ''; }, 2000);
  }
}

// ===== STEP DEFINITIONS =====
const steps = [
  {
    title: 'Personal Information',
    subtitle: "Let's start with the basics. This helps us personalize your experience.",
    render: () => `
      <div class="onboarding-step-title">👤 Tell us about yourself</div>
      <div class="onboarding-step-subtitle">Basic info for your personalized plan.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="input-group">
          <label class="input-label">First Name *</label>
          <input type="text" class="input" id="f_firstName" placeholder="Arjun" value="${profile.firstName || ''}" oninput="saveField('firstName', this.value)">
        </div>
        <div class="input-group">
          <label class="input-label">Last Name *</label>
          <input type="text" class="input" id="f_lastName" placeholder="Sharma" value="${profile.lastName || ''}" oninput="saveField('lastName', this.value)">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:16px;">
        <div class="input-group">
          <label class="input-label">Date of Birth *</label>
          <input type="date" class="input" id="f_dob" value="${profile.dob || ''}" oninput="saveField('dob', this.value); updateAge()">
        </div>
        <div class="input-group">
          <label class="input-label">Age</label>
          <input type="number" class="input" id="f_age" value="${profile.age || ''}" placeholder="25" oninput="saveField('age', this.value)">
        </div>
        <div class="input-group">
          <label class="input-label">Gender *</label>
          <select class="select" id="f_gender" onchange="saveField('gender', this.value)">
            <option value="">Select...</option>
            <option value="Male" ${profile.gender==='Male'?'selected':''}>Male</option>
            <option value="Female" ${profile.gender==='Female'?'selected':''}>Female</option>
            <option value="Other" ${profile.gender==='Other'?'selected':''}>Other / Prefer not to say</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;">
        <div class="input-group">
          <label class="input-label">Occupation</label>
          <select class="select" id="f_occupation" onchange="saveField('occupation', this.value)">
            <option value="">Select...</option>
            <option value="Student" ${profile.occupation==='Student'?'selected':''}>Student</option>
            <option value="Desk Job (IT/Office)" ${profile.occupation==='Desk Job (IT/Office)'?'selected':''}>Desk Job (IT/Office)</option>
            <option value="Physical Labor" ${profile.occupation==='Physical Labor'?'selected':''}>Physical Labor</option>
            <option value="Healthcare" ${profile.occupation==='Healthcare'?'selected':''}>Healthcare</option>
            <option value="Teacher/Professor" ${profile.occupation==='Teacher/Professor'?'selected':''}>Teacher/Professor</option>
            <option value="Business/Entrepreneur" ${profile.occupation==='Business/Entrepreneur'?'selected':''}>Business/Entrepreneur</option>
            <option value="Other" ${profile.occupation==='Other'?'selected':''}>Other</option>
          </select>
        </div>
        <div class="input-group">
          <label class="input-label">Work Hours/Day</label>
          <select class="select" id="f_workHours" onchange="saveField('workHours', this.value)">
            <option value="">Select...</option>
            <option value="Less than 6" ${profile.workHours==='Less than 6'?'selected':''}>Less than 6 hours</option>
            <option value="6-8" ${profile.workHours==='6-8'?'selected':''}>6-8 hours</option>
            <option value="8-10" ${profile.workHours==='8-10'?'selected':''}>8-10 hours</option>
            <option value="10-12" ${profile.workHours==='10-12'?'selected':''}>10-12 hours</option>
            <option value="12+" ${profile.workHours==='12+'?'selected':''}>12+ hours</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;">
        <div class="input-group">
          <label class="input-label">Average Sleep Hours</label>
          <select class="select" id="f_sleepHours" onchange="saveField('sleepHours', this.value)">
            <option value="">Select...</option>
            <option value="Less than 5" ${profile.sleepHours==='Less than 5'?'selected':''}>Less than 5 hours</option>
            <option value="5-6" ${profile.sleepHours==='5-6'?'selected':''}>5-6 hours</option>
            <option value="6-7" ${profile.sleepHours==='6-7'?'selected':''}>6-7 hours</option>
            <option value="7-8" ${profile.sleepHours==='7-8'?'selected':''}>7-8 hours (Ideal)</option>
            <option value="8+" ${profile.sleepHours==='8+'?'selected':''}>8+ hours</option>
          </select>
        </div>
        <div class="input-group">
          <label class="input-label">Stress Level</label>
          <select class="select" id="f_stressLevel" onchange="saveField('stressLevel', this.value)">
            <option value="">Select...</option>
            <option value="Low" ${profile.stressLevel==='Low'?'selected':''}>Low — Life is good 😊</option>
            <option value="Moderate" ${profile.stressLevel==='Moderate'?'selected':''}>Moderate — Some pressure</option>
            <option value="High" ${profile.stressLevel==='High'?'selected':''}>High — Pretty stressed</option>
            <option value="Very High" ${profile.stressLevel==='Very High'?'selected':''}>Very High — Constant stress</option>
          </select>
        </div>
      </div>
    `,
    validate: () => {
      if (!profile.firstName) { TXUtils.toast.error('Please enter your first name'); return false; }
      if (!profile.gender) { TXUtils.toast.error('Please select your gender'); return false; }
      if (!profile.age && !profile.dob) { TXUtils.toast.error('Please enter your age or date of birth'); return false; }
      return true;
    }
  },
  {
    title: 'Body Metrics',
    subtitle: 'Your physical measurements help calculate your exact calorie and macro needs.',
    render: () => `
      <div class="onboarding-step-title">📏 Body Measurements</div>
      <div class="onboarding-step-subtitle">Used to calculate BMI, BMR, TDEE and your macro targets.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="input-group">
          <label class="input-label">Height (cm) *</label>
          <input type="number" class="input" id="f_height" placeholder="175" value="${profile.height || ''}" oninput="saveField('height', parseFloat(this.value)); updateBMI()">
        </div>
        <div class="input-group">
          <label class="input-label">Current Weight (kg) *</label>
          <input type="number" class="input" id="f_weight" placeholder="75" value="${profile.weight || ''}" step="0.1" oninput="saveField('weight', parseFloat(this.value)); updateBMI()">
        </div>
        <div class="input-group">
          <label class="input-label">Target Weight (kg) *</label>
          <input type="number" class="input" id="f_targetWeight" placeholder="70" value="${profile.targetWeight || ''}" step="0.1" oninput="saveField('targetWeight', parseFloat(this.value))">
        </div>
        <div class="input-group">
          <label class="input-label">Body Fat % (estimate)</label>
          <select class="select" id="f_bodyFat" onchange="saveField('bodyFat', this.value)">
            <option value="">Not sure</option>
            <option value="8-12" ${profile.bodyFat==='8-12'?'selected':''}>8-12% (Very lean, visible abs)</option>
            <option value="13-17" ${profile.bodyFat==='13-17'?'selected':''}>13-17% (Lean, some abs)</option>
            <option value="18-22" ${profile.bodyFat==='18-22'?'selected':''}>18-22% (Average, some fat)</option>
            <option value="23-27" ${profile.bodyFat==='23-27'?'selected':''}>23-27% (Above average)</option>
            <option value="28-32" ${profile.bodyFat==='28-32'?'selected':''}>28-32% (Overweight)</option>
            <option value="33+" ${profile.bodyFat==='33+'?'selected':''}>33%+ (Obese range)</option>
          </select>
        </div>
      </div>
      <div id="bmiDisplay" style="margin-top:12px;display:none;" class="bmi-display">
        <div>
          <div style="font-size:0.75rem;color:var(--text-muted);">Your BMI</div>
          <div style="font-size:1.6rem;font-weight:800;" id="bmiVal">—</div>
        </div>
        <div id="bmiCategory" style="font-weight:600;"></div>
      </div>
      <div style="margin-top:24px;">
        <div style="font-weight:600;margin-bottom:12px;">Activity Level *</div>
        <div style="display:flex;flex-direction:column;gap:8px;" id="activityOptions">
          ${['Sedentary (desk job, no exercise)', 'Lightly Active (1-3 days/week)', 'Moderately Active (3-5 days/week)', 'Very Active (6-7 days/week)', 'Extremely Active (athlete, physical job)'].map(a => `
            <div class="option-btn" onclick="selectActivity('${a}')" id="act_${a.split(' ')[0]}" style="flex-direction:row;justify-content:flex-start;gap:12px;${profile.activityLevel===a?'border-color:var(--primary);background:rgba(99,102,241,0.12);color:var(--primary-light);':''}">
              <span>${{Sedentary:'🪑',Lightly:'🚶',Moderately:'🏃',Very:'🏋️',Extremely:'⚡'}[a.split(' ')[0]] || '💪'}</span>
              <span>${a}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `,
    validate: () => {
      if (!profile.height) { TXUtils.toast.error('Please enter your height'); return false; }
      if (!profile.weight) { TXUtils.toast.error('Please enter your weight'); return false; }
      if (!profile.targetWeight) { TXUtils.toast.error('Please enter your target weight'); return false; }
      if (!profile.activityLevel) { TXUtils.toast.error('Please select your activity level'); return false; }
      return true;
    }
  },
  {
    title: 'Body Measurements',
    subtitle: 'Optional but powerful — tracking these helps show progress even when the scale doesnt move.',
    render: () => `
      <div class="onboarding-step-title">📐 Detailed Measurements</div>
      <div class="onboarding-step-subtitle">All measurements in centimeters. Take them in the morning, relaxed.</div>
      <div class="measurements-grid">
        ${TX_DATA.bodyParts.filter(b => b.key !== 'weight' && b.key !== 'bodyfat').map(bp => `
          <div class="input-group">
            <label class="input-label">${bp.icon} ${bp.label} (cm)</label>
            <input type="number" class="input" id="f_${bp.key}" placeholder="—" step="0.1" value="${profile[bp.key] || ''}" oninput="saveField('${bp.key}', parseFloat(this.value))">
          </div>
        `).join('')}
      </div>
      <div style="margin-top:20px;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.15);border-radius:var(--radius-sm);padding:14px 16px;">
        <div style="font-weight:600;font-size:0.85rem;color:var(--info);margin-bottom:6px;">📋 How to measure correctly:</div>
        <ul style="font-size:0.82rem;color:var(--text-secondary);line-height:1.8;padding-left:16px;list-style:disc;">
          <li><strong>Waist:</strong> At navel level, relaxed (not sucked in)</li>
          <li><strong>Chest:</strong> Around the fullest part</li>
          <li><strong>Arms:</strong> Flexed bicep at widest point</li>
          <li><strong>Hips:</strong> At the widest point</li>
          <li><strong>Thigh:</strong> Midway between hip and knee</li>
        </ul>
      </div>
    `,
    validate: () => true // All optional
  },
  {
    title: 'Medical History',
    subtitle: 'This is confidential and helps the AI create a safe plan for you.',
    render: () => `
      <div class="onboarding-step-title">🏥 Health & Medical History</div>
      <div class="onboarding-step-subtitle">All information is stored locally on your device. We never share it.</div>
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="input-group">
          <label class="input-label">Medical Conditions (if any)</label>
          <div class="goal-grid" style="grid-template-columns:repeat(auto-fill,minmax(130px,1fr));">
            ${['None', 'Diabetes (Type 2)', 'Hypertension', 'PCOD/PCOS', 'Thyroid', 'Heart Condition', 'Asthma', 'Lower Back Pain', 'Knee Issues', 'Shoulder Injury', 'Anxiety/Depression', 'Other'].map(c => `
              <div class="option-btn" onclick="toggleCondition('${c}')" id="cond_${c.replace(/\W/g,'')}" style="${(profile.conditions||[]).includes(c)?'border-color:var(--primary);background:rgba(99,102,241,0.12);color:var(--primary-light);':''}">${c}</div>
            `).join('')}
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">Injuries (if any)</label>
          <textarea class="input" id="f_injuries" placeholder="e.g. Right knee ACL (2022), Lower back pain" style="height:80px;" oninput="saveField('injuries', this.value)">${profile.injuries || ''}</textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="input-group">
            <label class="input-label">Allergies</label>
            <input type="text" class="input" id="f_allergies" placeholder="e.g. Lactose, Gluten, Nuts" value="${profile.allergies || ''}" oninput="saveField('allergies', this.value)">
          </div>
          <div class="input-group">
            <label class="input-label">Current Medications</label>
            <input type="text" class="input" id="f_medications" placeholder="e.g. Metformin, Levothyroxine" value="${profile.medications || ''}" oninput="saveField('medications', this.value)">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
          <div class="input-group">
            <label class="input-label">Blood Pressure</label>
            <select class="select" id="f_bloodPressure" onchange="saveField('bloodPressure', this.value)">
              <option value="">Select</option>
              <option value="Normal" ${profile.bloodPressure==='Normal'?'selected':''}>Normal</option>
              <option value="High" ${profile.bloodPressure==='High'?'selected':''}>High (Hypertension)</option>
              <option value="Low" ${profile.bloodPressure==='Low'?'selected':''}>Low (Hypotension)</option>
              <option value="Unknown" ${profile.bloodPressure==='Unknown'?'selected':''}>Don't Know</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">Smoking</label>
            <select class="select" id="f_smoking" onchange="saveField('smoking', this.value)">
              <option value="">Select</option>
              <option value="Never" ${profile.smoking==='Never'?'selected':''}>Never</option>
              <option value="Quit" ${profile.smoking==='Quit'?'selected':''}>Quit</option>
              <option value="Occasionally" ${profile.smoking==='Occasionally'?'selected':''}>Occasionally</option>
              <option value="Daily" ${profile.smoking==='Daily'?'selected':''}>Daily</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">Alcohol</label>
            <select class="select" id="f_alcohol" onchange="saveField('alcohol', this.value)">
              <option value="">Select</option>
              <option value="Never" ${profile.alcohol==='Never'?'selected':''}>Never</option>
              <option value="Rarely" ${profile.alcohol==='Rarely'?'selected':''}>Rarely</option>
              <option value="Occasionally" ${profile.alcohol==='Occasionally'?'selected':''}>Occasionally</option>
              <option value="Regularly" ${profile.alcohol==='Regularly'?'selected':''}>Regularly</option>
            </select>
          </div>
        </div>
      </div>
    `,
    validate: () => true
  },
  {
    title: 'Fitness Level & Goals',
    subtitle: 'What are you trying to achieve? You can select multiple goals.',
    render: () => `
      <div class="onboarding-step-title">🎯 Your Fitness Goals</div>
      <div class="onboarding-step-subtitle">Select all that apply. The AI will prioritize based on your selection.</div>
      <div style="margin-bottom:20px;">
        <div style="font-weight:600;margin-bottom:10px;">Current Fitness Level *</div>
        <div style="display:flex;gap:10px;">
          ${['Beginner', 'Intermediate', 'Advanced'].map(l => `
            <div class="option-btn" onclick="selectLevel('${l}')" id="lvl_${l}" style="flex:1;${profile.fitnessLevel===l?'border-color:var(--primary);background:rgba(99,102,241,0.12);color:var(--primary-light);':''}">
              <span class="option-icon">${{Beginner:'🌱',Intermediate:'🔥',Advanced:'⚡'}[l]}</span>
              ${l}
            </div>
          `).join('')}
        </div>
      </div>
      <div style="font-weight:600;margin-bottom:10px;">Primary Goals * (select all that apply)</div>
      <div class="goal-grid">
        ${[
          {icon:'🔥',label:'Fat Loss'}, {icon:'⚖️',label:'Weight Loss'}, {icon:'💪',label:'Muscle Gain'},
          {icon:'🔄',label:'Body Recomposition'}, {icon:'🏃',label:'Athletic Performance'}, {icon:'🏋️',label:'Powerlifting'},
          {icon:'🌟',label:'Bodybuilding'}, {icon:'🤸',label:'Calisthenics'}, {icon:'🏅',label:'Marathon'},
          {icon:'🧘',label:'Mobility'}, {icon:'🧍',label:'Posture'}, {icon:'🌀',label:'Flexibility'},
          {icon:'❤️',label:'General Health'}, {icon:'🏆',label:'David Laid Physique'}, {icon:'✨',label:'Aesthetic Physique'},
          {icon:'🪨',label:'Jawline'}, {icon:'📸',label:'Face Fat Reduction'}, {icon:'💆',label:'Skin Improvement'},
          {icon:'💇',label:'Hair Improvement'}, {icon:'🎙️',label:'Voice Improvement'}
        ].map(g => `
          <div class="option-btn" onclick="toggleGoal('${g.label}')" id="goal_${g.label.replace(/\s/g,'_')}" style="${(profile.goals||[]).includes(g.label)?'border-color:var(--primary);background:rgba(99,102,241,0.12);color:var(--primary-light);':''}">
            <span class="option-icon">${g.icon}</span>${g.label}
          </div>
        `).join('')}
      </div>
    `,
    validate: () => {
      if (!profile.fitnessLevel) { TXUtils.toast.error('Please select your fitness level'); return false; }
      if (!profile.goals || profile.goals.length === 0) { TXUtils.toast.error('Please select at least one goal'); return false; }
      return true;
    }
  },
  {
    title: 'Food & Nutrition Preferences',
    subtitle: 'Your meal plan will be built around what you enjoy eating.',
    render: () => `
      <div class="onboarding-step-title">🍽️ Food Preferences</div>
      <div class="onboarding-step-subtitle">Be honest — a plan you enjoy is a plan you stick to.</div>
      <div style="margin-bottom:20px;">
        <div style="font-weight:600;margin-bottom:10px;">Diet Type *</div>
        <div class="goal-grid" style="grid-template-columns:repeat(auto-fill,minmax(130px,1fr));">
          ${[
            {icon:'🐔',label:'Non-Vegetarian'}, {icon:'🥚',label:'Eggetarian'},
            {icon:'🥗',label:'Vegetarian'}, {icon:'🌱',label:'Vegan'},
            {icon:'🍛',label:'Indian'}, {icon:'🥓',label:'Keto'},
            {icon:'🥙',label:'Low Carb'}, {icon:'💪',label:'High Protein'}
          ].map(d => `

// ===== STEP RENDERING =====
function renderStep() {
  const step = steps[currentStep];
  const card = document.getElementById('stepCard');
  card.innerHTML = step.render();
  card.className = 'onboarding-card animate-fade-in';

  // Call onEnter if exists
  if (step.onEnter) step.onEnter();

  // Update UI
  document.getElementById('stepLabel').textContent = `Step ${currentStep + 1} of ${TOTAL_STEPS}`;
  document.getElementById('stepTitle').textContent = step.title;
  document.getElementById('progressPct').textContent = `${Math.round((currentStep / TOTAL_STEPS) * 100)}% complete`;
  document.getElementById('footerStepInfo').textContent = `${currentStep + 1} / ${TOTAL_STEPS}`;

  // Step dots
  const dotsContainer = document.getElementById('stepDots');
  dotsContainer.innerHTML = steps.map((_, i) => `
    <div class="step-dot ${i < currentStep ? 'done' : ''} ${i === currentStep ? 'active' : ''}"></div>
  `).join('');

  // Prev button
  document.getElementById('prevBtn').style.visibility = currentStep === 0 ? 'hidden' : 'visible';

  // Next button
  const nextBtn = document.getElementById('nextBtn');
  if (currentStep === TOTAL_STEPS - 1) {
    nextBtn.textContent = 'Go to Dashboard →';
    nextBtn.onclick = () => completeOnboarding();
  } else {
    nextBtn.textContent = 'Continue →';
    nextBtn.onclick = () => nextStep();
  }
}

function nextStep() {
  const step = steps[currentStep];
  if (!step.validate()) return;
  if (currentStep < TOTAL_STEPS - 1) {
    currentStep++;
    saveProgress();
    renderStep();
    window.scrollTo(0, 0);
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    saveProgress();
    renderStep();
    window.scrollTo(0, 0);
  }
}

// ===== FIELD HELPERS =====
function saveField(key, value) {
  profile[key] = value;
  saveProgress();
}

function updateAge() {
  const dob = document.getElementById('f_dob');
  if (dob && dob.value) {
    const age = Math.floor((Date.now() - new Date(dob.value)) / (365.25 * 24 * 60 * 60 * 1000));
    profile.age = age;
    const ageInput = document.getElementById('f_age');
    if (ageInput) ageInput.value = age;
    saveProgress();
  }
}

function updateBMI() {
  const h = parseFloat(document.getElementById('f_height')?.value);
  const w = parseFloat(document.getElementById('f_weight')?.value);
  if (h && w) {
    const bmi = TXUtils.fitness.bmi(w, h);
    const cat = TXUtils.fitness.bmiCategory(bmi);
    const display = document.getElementById('bmiDisplay');
    const val = document.getElementById('bmiVal');
    const catEl = document.getElementById('bmiCategory');
    if (display && val && catEl) {
      display.style.display = 'flex';
      val.textContent = bmi;
      val.style.color = cat.color;
      catEl.textContent = cat.label;
      catEl.style.color = cat.color;
    }
    profile.bmi = parseFloat(bmi);
    saveProgress();
  }
}

function selectActivity(value) {
  profile.activityLevel = value;
  document.querySelectorAll('[id^="act_"]').forEach(el => {
    el.style.borderColor = '';
    el.style.background = '';
    el.style.color = '';
  });
  const firstWord = value.split(' ')[0];
  const el = document.getElementById('act_' + firstWord);
  if (el) {
    el.style.borderColor = 'var(--primary)';
    el.style.background = 'rgba(99,102,241,0.12)';
    el.style.color = 'var(--primary-light)';
  }
  saveProgress();
}

function toggleGoal(goal) {
  if (!profile.goals) profile.goals = [];
  const idx = profile.goals.indexOf(goal);
  if (idx >= 0) profile.goals.splice(idx, 1);
  else profile.goals.push(goal);
  const el = document.getElementById('goal_' + goal.replace(/\s/g, '_'));
  if (el) {
    const active = profile.goals.includes(goal);
    el.style.borderColor = active ? 'var(--primary)' : '';
    el.style.background = active ? 'rgba(99,102,241,0.12)' : '';
    el.style.color = active ? 'var(--primary-light)' : '';
  }
  saveProgress();
}

function selectLevel(level) {
  profile.fitnessLevel = level;
  ['Beginner','Intermediate','Advanced'].forEach(l => {
    const el = document.getElementById('lvl_' + l);
    if (el) { el.style.borderColor = ''; el.style.background = ''; el.style.color = ''; }
  });
  const el = document.getElementById('lvl_' + level);
  if (el) { el.style.borderColor = 'var(--primary)'; el.style.background = 'rgba(99,102,241,0.12)'; el.style.color = 'var(--primary-light)'; }
  saveProgress();
}

function toggleCondition(condition) {
  if (!profile.conditions) profile.conditions = [];
  if (condition === 'None') { profile.conditions = ['None']; }
  else {
    const noneIdx = profile.conditions.indexOf('None');
    if (noneIdx >= 0) profile.conditions.splice(noneIdx, 1);
    const idx = profile.conditions.indexOf(condition);
    if (idx >= 0) profile.conditions.splice(idx, 1);
    else profile.conditions.push(condition);
  }
  document.querySelectorAll('[id^="cond_"]').forEach(el => { el.style.borderColor = ''; el.style.background = ''; el.style.color = ''; });
  profile.conditions.forEach(c => {
    const el = document.getElementById('cond_' + c.replace(/\W/g,''));
    if (el) { el.style.borderColor = 'var(--primary)'; el.style.background = 'rgba(99,102,241,0.12)'; el.style.color = 'var(--primary-light)'; }
  });
  saveProgress();
}

function selectDiet(diet) {
  profile.dietType = diet;
  document.querySelectorAll('[id^="diet_"]').forEach(el => { el.style.borderColor = ''; el.style.background = ''; el.style.color = ''; });
  const el = document.getElementById('diet_' + diet.replace(/\s/g, '_'));
  if (el) { el.style.borderColor = 'var(--primary)'; el.style.background = 'rgba(99,102,241,0.12)'; el.style.color = 'var(--primary-light)'; }
  saveProgress();
}

function toggleEquipment(equip) {
  if (!profile.equipment) profile.equipment = [];
  const idx = profile.equipment.indexOf(equip);
  if (idx >= 0) profile.equipment.splice(idx, 1);
  else profile.equipment.push(equip);
  const el = document.getElementById('equip_' + equip.replace(/\W/g,'_'));
  if (el) {
    const active = profile.equipment.includes(equip);
    el.style.borderColor = active ? 'var(--primary)' : '';
    el.style.background = active ? 'rgba(99,102,241,0.12)' : '';
    el.style.color = active ? 'var(--primary-light)' : '';
  }
  saveProgress();
}

function selectWorkoutTime(time) {
  profile.workoutTime = time;
  document.querySelectorAll('[id^="wtime_"]').forEach(el => { el.style.borderColor = ''; el.style.background = ''; el.style.color = ''; });
  const icons = { '🌅': '🌅', '☀️': '☀️', '🌤️': '🌤️', '🌆': '🌆', '🌙': '🌙' };
  document.querySelectorAll('[id^="wtime_"]').forEach(el => {
    if (el.textContent.includes(time.split(' ')[0])) {
      el.style.borderColor = 'var(--primary)'; el.style.background = 'rgba(99,102,241,0.12)'; el.style.color = 'var(--primary-light)';
    }
  });
  saveProgress();
}

function toggleNotif(key, el) {
  el.classList.toggle('on');
  profile[key] = el.classList.contains('on');
  saveProgress();
}

function previewPhoto(input, angle) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = (e) => {
      profile['photo_' + angle] = e.target.result;
      saveProgress();
      const slot = document.getElementById('photoSlot_' + angle);
      if (slot) {
        slot.innerHTML = `<img src="${e.target.result}" class="photo-preview"><div class="photo-slot-label">${angle.replace('_',' ')}</div>`;
      }
      TXUtils.achievements.earn('a012');
      TXUtils.toast.success('Progress photo saved! 📸');
    };
    reader.readAsDataURL(input.files[0]);
  }
}

// ===== AI PLAN GENERATION =====
function generateAIPlan() {
  const bmr = TXUtils.fitness.bmr(profile.weight || 70, profile.height || 170, profile.age || 25, profile.gender || 'Male');
  const tdee = TXUtils.fitness.tdee(bmr, profile.activityLevel || 'Moderately Active (3-5 days/week)');
  const primaryGoal = (profile.goals || [])[0] || 'General Health';

  let targetCalories = tdee;
  if (primaryGoal.includes('Fat Loss') || primaryGoal.includes('Weight Loss')) targetCalories = tdee - 500;
  else if (primaryGoal.includes('Muscle Gain') || primaryGoal.includes('Bodybuilding')) targetCalories = tdee + 300;

  const macros = TXUtils.fitness.macros(targetCalories, primaryGoal);

  // Choose workout plan
  let planId = 'full-body';
  const days = profile.workoutDays || 3;
  if (days >= 6) planId = 'ppl';
  else if (days >= 4) planId = 'upper-lower';
  else if (days >= 3 && (profile.goals||[]).includes('Calisthenics')) planId = 'calisthenics';
  else planId = 'full-body';

  const workoutPlan = TX_DATA.workoutPlans.find(p => p.id === planId);

  // Choose meal plan
  const mealPlanId = profile.dietType === 'Vegetarian' || profile.dietType === 'Vegan' ? 'mp002' : 'mp001';
  const mealPlan = TX_DATA.mealPlans.find(p => p.id === mealPlanId);

  const aiPlan = {
    generated_at: new Date().toISOString(),
    tdee, bmr, targetCalories, macros,
    workout_plan: workoutPlan,
    meal_plan: mealPlan,
    recommended_supplements: TX_DATA.supplements.slice(0, 5),
    morning_routine: TX_DATA.morningRoutine,
    night_routine: TX_DATA.nightRoutine,
    habits: TX_DATA.habits.slice(0, 7),
  };

  TXUtils.storage.set('ai_plan', aiPlan);
  TXUtils.storage.set('user_profile', profile);
  TXUtils.xp.add(200, 'Completed onboarding!');
  TXUtils.achievements.earn('a011');
}

function completeOnboarding() {
  // Mark user as complete
  const user = TXUtils.auth.getUser();
  if (user) {
    user.onboarding_complete = true;
    user.profile = profile;
    TXUtils.auth.login(user);
    // Update in all users
    const allUsers = JSON.parse(localStorage.getItem('tx_all_users') || '[]');
    const idx = allUsers.findIndex(u => u.id === user.id);
    if (idx >= 0) { allUsers[idx] = user; localStorage.setItem('tx_all_users', JSON.stringify(allUsers)); }
  }
  TXUtils.storage.set('user_profile', profile);
  TXUtils.toast.success(`Welcome to TransformX AI, ${profile.firstName}! 🎉 Your plan is ready!`);
  setTimeout(() => { window.location.href = 'app.html'; }, 1500);
}

// ===== INIT =====
TXUtils.theme.apply();
loadProgress();
renderStep();

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'SELECT') {
    // Don't trigger on option buttons
    if (!e.target.classList.contains('option-btn')) nextStep();
  }
});
</script>
